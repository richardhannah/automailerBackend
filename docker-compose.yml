services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=automailer
      - DB_USERNAME=automailer
      - DB_PASSWORD=automailer_dev
      - SMTP2GO_API_KEY=${SMTP2GO_API_KEY:-}
      - SMTP2GO_SENDER_NAME=${SMTP2GO_SENDER_NAME:-AutoMailer}
      - SMTP2GO_SENDER_EMAIL=${SMTP2GO_SENDER_EMAIL:-}
    depends_on:
      - db

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=automailer
      - POSTGRES_PASSWORD=automailer_dev
      - POSTGRES_DB=automailer
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
